<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>AI课堂控制台系统</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    padding:20px;
    background:#f5f5f5;
}

h2{margin-bottom:10px;}

button{
    padding:10px 18px;
    margin:6px;
    font-size:16px;
    cursor:pointer;
}

.panel{
    background:white;
    padding:20px;
    border-radius:10px;
    width:700px;
    margin:auto;
}

.bar{
    width:300px;
    height:18px;
    background:#ddd;
    margin:6px auto;
    border-radius:8px;
}

.inner{
    height:18px;
    background:#4CAF50;
    border-radius:8px;
}

.qbtn{
    background:#2196F3;
    color:white;
    border:none;
}

.warn{
    background:#FF9800;
    color:white;
}

.danger{
    background:#f44336;
    color:white;
}
</style>

</head>

<body>

<h2>🧠 AI课堂教师控制台</h2>

<div class="panel">

<!-- 题目切换 -->
<h3>切换题目</h3>

<button class="qbtn" onclick="setQ(1)">Q1 机制</button>
<button class="qbtn" onclick="setQ(2)">Q2 应用</button>
<button class="qbtn" onclick="setQ(3)">Q3 不良反应</button>

<hr>

<!-- 投票按钮 -->
<h3>录入学生答案</h3>

<button onclick="vote('A')">A</button>
<button onclick="vote('B')">B</button>
<button onclick="vote('C')">C</button>
<button onclick="vote('D')">D</button>

<p id="status">当前题目：Q1</p>

<hr>

<!-- 控制显示 -->
<h3>结果控制</h3>

<button class="warn" onclick="showResult()">显示结果🔥</button>
<button class="danger" onclick="reset()">清空数据</button>

<p id="total"></p>

<!-- 统计区域 -->
<div id="resultArea" style="display:none">

<p>A</p><div class="bar"><div id="a" class="inner"></div></div>
<p>B</p><div class="bar"><div id="b" class="inner"></div></div>
<p>C</p><div class="bar"><div id="c" class="inner"></div></div>
<p>D</p><div class="bar"><div id="d" class="inner"></div></div>

</div>

</div>

<script>

let currentQ = 1;

// 每道题独立数据（关键🔥）
let data = {
    1:{A:0,B:0,C:0,D:0},
    2:{A:0,B:0,C:0,D:0},
    3:{A:0,B:0,C:0,D:0}
};

function setQ(q){
    currentQ = q;
    document.getElementById("status").innerText =
        "当前题目：Q" + q;
}

function vote(option){
    data[currentQ][option]++;
}

function showResult(){

    let d = data[currentQ];
    let total = d.A + d.B + d.C + d.D;

    document.getElementById("resultArea").style.display="block";

    document.getElementById("a").style.width = (d.A/total*300||0)+"px";
    document.getElementById("b").style.width = (d.B/total*300||0)+"px";
    document.getElementById("c").style.width = (d.C/total*300||0)+"px";
    document.getElementById("d").style.width = (d.D/total*300||0)+"px";

    document.getElementById("total").innerText =
        "当前Q" + currentQ + "总人数：" + total;
}

function reset(){
    data[currentQ] = {A:0,B:0,C:0,D:0};
    document.getElementById("resultArea").style.display="none";
    document.getElementById("total").innerText="";
}

</script>

</body>
</html>
